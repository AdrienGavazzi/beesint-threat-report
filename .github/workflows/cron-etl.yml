name: Cron ETL

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "Ignorer le cache local et re-fetch toutes les sources"
        type: boolean
        default: false
      skip_email:
        description: "Ne pas notifier les abonnés email pour ce run"
        type: boolean
        default: false

concurrency:
  group: cron-etl
  cancel-in-progress: false

jobs:
  run-etl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      STORAGE_BACKEND: s3
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      ORACLE_S3_ACCESS_KEY: ${{ secrets.ORACLE_S3_ACCESS_KEY }}
      ORACLE_S3_SECRET_KEY: ${{ secrets.ORACLE_S3_SECRET_KEY }}
      ORACLE_S3_ENDPOINT: ${{ secrets.ORACLE_S3_ENDPOINT }}
      ORACLE_S3_BUCKET: ${{ secrets.ORACLE_S3_BUCKET }}
      THREAT_REPORT_INTERNAL_SECRET: ${{ secrets.THREAT_REPORT_INTERNAL_SECRET }}
      BACKEND_WEBHOOK_URL: ${{ secrets.BACKEND_WEBHOOK_URL }}
      SENTRY_DSN_THREAT_REPORT: ${{ secrets.SENTRY_DSN_THREAT_REPORT }}
      THREATFOX_AUTH_KEY: ${{ secrets.THREATFOX_AUTH_KEY }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install WeasyPrint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz-subset0

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run orchestrate
        run: python -m beesint_threat_report.orchestrate ${{ inputs.force_refresh && '--force-refresh' || '' }} ${{ inputs.skip_email && '--skip-email' || '' }}
